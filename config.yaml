# ============================================================
# QIAS 2026 — Al-Mawarith Pipeline Configuration
# ============================================================

# --- Method ---
# "llm_reasoning" = pure LLM solves the inheritance problem
# "llm_scraping"  = LLM parses input → scrapes symbolic solver → LLM formats output
method: "llm_scraping"

# --- Model ---
model:
  provider: "mistral"  
  name: "mistral-small-2506"          
  temperature: 0
  max_output_tokens: 7000
  max_retries: 3
  retry_delay: 5

# --- Paths ---
paths:
  system_prompt: "prompts/system_prompt.txt"
  parsing_prompt: "prompts/parsing_prompt.txt"
  dataset_dir: "dataset"        
  output_dir: "output"

# --- Benchmark ---
benchmark:
  sample_size: 500
  seed: 42
  source: "train"               

# --- Evaluation ---
evaluation:
  evaluator_src: "evaluator"