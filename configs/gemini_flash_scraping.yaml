# Round 2: Gemini 2.5 Flash + Scraping
method: "llm_scraping"

model:
  provider: "gemini"
  name: "gemini-2.5-flash"
  temperature: 0
  max_output_tokens: 7000
  max_retries: 3
  retry_delay: 5

paths:
  system_prompt: "prompts/system_prompt.txt"
  parsing_prompt: "prompts/parsing_prompt.txt"
  dataset_dir: "dataset"
  output_dir: "output"

benchmark:
  sample_size: 500
  seed: 42
  source: "test"

evaluation:
  evaluator_src: "evaluator"
